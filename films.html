<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Louis — Courts Métrages</title>
    <link rel="icon" href="./doc/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Radley:ital@0;1&display=swap" rel="stylesheet">
    <script src="https://player.vimeo.com/api/player.js"></script>
    <style>
        /* ===== VARIABLES & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            --bg-color: #f4f1e8;
            --text-color: #191919;
            --border-color: #191919;
            --card-bg: rgba(25, 25, 25, 0.04);
            --modal-bg: #ffffff;
            --modal-text: #191919;
            --modal-border: rgba(25, 25, 25, 0.2);
            --btn-bg: #9c481a;
            --btn-text: #f4f1e8;
            font-family: 'Radley', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --border-color: #f0f0f0;
            --card-bg: rgba(240, 240, 240, 0.05);
            --modal-bg: #2a2a2a;
            --modal-text: #f0f0f0;
            --modal-border: rgba(240, 240, 240, 0.2);
            --btn-bg: #f0f0f0;
            --btn-text: #1a1a1a;
        }

        /* ===== HEADER : style épuré et harmonieux ===== */
        header {
            position: sticky;
            top: 0;
            height: 100px;  /* légèrement réduit pour un meilleur équilibre */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background-color: transparent;
            z-index: 100;
            transition: background-color 0.3s ease, backdrop-filter 0.3s ease;
            flex-shrink: 0;
            border-radius: 0 !important;
        }
        header.expanded {
            background-color: color-mix(in srgb, var(--bg-color) 92%, transparent);
            backdrop-filter: blur(12px);
        }
        /* Fine ligne discrète sous le header, uniquement quand il est expansé */
        header.expanded::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 1px;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--border-color) 25%, transparent), transparent);
            opacity: 0.7;
            pointer-events: none;
        }

        .logo-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.4s ease;
            z-index: 20;
        }
        header.expanded .logo-container {
            left: 2rem;
            transform: translate(0, -50%);
        }
        #toggleImage {
            width: 65px;
            height: 65px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.2s ease;
            border-radius: 12px;
        }
        #toggleImage:hover { transform: scale(1.05) rotate(3deg); }

        .options {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0s 0.3s;
            margin-left: auto;
        }
        header.expanded .options {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.25s ease 0.05s, visibility 0s 0s;
        }
        .options ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .options li {
            display: inline-block;
            line-height: 1;
        }
        .options a, .theme-toggle {
            color: var(--text-color);
            text-decoration: none;
            font-family: 'Radley', serif;
            font-size: 1.1rem;
            padding: 0.5rem 0;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.2s, opacity 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            display: inline-block;
            line-height: 1.2;
        }
        .options a:hover, .theme-toggle:hover {
            border-bottom-color: var(--border-color);
        }

        .lang-switcher {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
        }
        .lang-opt {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            padding: 0.2rem 0;
            border-bottom: 1.5px solid transparent;
            opacity: 0.5;
            transition: opacity 0.2s, border-color 0.2s;
        }
        .lang-opt.active-lang {
            border-bottom-color: var(--border-color);
            opacity: 1;
        }
        .lang-opt:hover {
            opacity: 1;
        }
        .lang-sep {
            opacity: 0.4;
            font-size: 1rem;
            user-select: none;
        }

        /* ===== MAIN ===== */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 2rem 5rem;
        }
        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .section-title {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 400;
            font-style: italic;
        }
        .section-label {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.4;
        }

        /* ===== GRILLE (cartes avec bordure douce) ===== */
        .films-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 2rem 1.5rem;
        }
        .film-poster-card {
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.2s;
            border-radius: 20px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid color-mix(in srgb, var(--border-color) 15%, transparent);
        }
        .film-poster-card:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        .poster-img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
            background: #2c2c2c;
        }
        .film-title-card {
            padding: 0.7rem 0.6rem 0.9rem;
            font-size: 0.9rem;
            font-weight: 400;
            text-align: center;
            font-style: italic;
            border-top: 1px solid color-mix(in srgb, var(--border-color) 25%, transparent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== MODALE ===== */
        .film-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .film-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: var(--modal-bg);
            color: var(--modal-text);
            max-width: 750px;
            width: 90%;
            border-radius: 32px;
            overflow-y: auto;
            max-height: 90vh;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid color-mix(in srgb, var(--border-color) 15%, transparent);
            animation: modalFadeIn 0.25s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-banner {
            width: 100%;
            height: auto;
            display: block;
            background: #2c2c2c;
            border-bottom: 1px solid var(--modal-border);
        }
        .modal-poster {
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: cover;
        }
        .modal-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .modal-title {
            font-size: 1.8rem;
            font-style: italic;
            font-weight: 400;
        }
        .modal-meta {
            font-size: 0.85rem;
            opacity: 0.7;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .modal-role {
            font-size: 0.85rem;
            border-left: 2px solid var(--border-color);
            padding-left: 0.6rem;
            opacity: 0.8;
        }
        .modal-desc {
            line-height: 1.4;
            font-size: 0.95rem;
            margin-top: 0.2rem;
        }
        .modal-tags {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 0.2rem 0;
        }
        .modal-tag {
            font-size: 0.7rem;
            border: 1px solid color-mix(in srgb, var(--border-color) 50%, transparent);
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            opacity: 0.7;
        }
        .watch-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--border-color);
            font-family: 'Radley', serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.7rem 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .watch-btn:hover {
            filter: brightness(1.05);
            transform: scale(1.01);
        }
        .detailed-desc {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--modal-border);
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.85;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            font-size: 1.8rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }
        .close-modal:hover { background: rgba(0, 0, 0, 0.9); transform: scale(1.05); }

        /* ===== LECTEUR VIDÉO ===== */
        .video-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .video-overlay.active { display: flex; }
        .overlay-inner {
            position: relative;
            width: min(90%, 1000px);
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            outline: none;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
        }
        .vimeo-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border: 0;
            outline: none;
        }
        .video-click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            cursor: pointer;
            z-index: 5;
        }
        .custom-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: white;
            font-family: 'Radley', serif;
            position: relative;
            z-index: 10;
        }
        .custom-controls button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 40px;
            transition: background 0.2s;
            font-family: 'Radley', serif;
            outline: none;
        }
        .custom-controls button:hover { background: rgba(255,255,255,0.2); }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: color-mix(in srgb, var(--border-color) 30%, transparent);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .progress-filled {
            height: 100%;
            width: 0%;
            background: var(--text-color);
            border-radius: 10px;
            opacity: 0.8;
        }
        .time-display {
            font-family: inherit;
            font-size: 0.85rem;
        }

        /* ===== FOOTER ===== */
        footer {
            border-top: 1px solid color-mix(in srgb, var(--border-color) 15%, transparent);
            padding: 3rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 2rem;
            margin-top: 2rem;
            border-radius: 16px 16px 0 0;
            background: var(--card-bg);
        }
        .footer-name { font-size: 1.5rem; font-style: italic; }
        .footer-contact {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: right;
        }
        .footer-contact a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1.5px solid transparent;
            opacity: 0.65;
            transition: 0.2s;
        }
        .footer-contact a:hover {
            border-bottom-color: var(--border-color);
            opacity: 1;
        }

        @media (max-width: 640px) {
            header { height: 80px; padding: 0 1rem; }
            .logo-container { top: 50%; }
            #toggleImage { width: 55px; height: 55px; }
            header.expanded .logo-container { left: 1rem; }
            .options ul { gap: 1.2rem; }
            .options a, .theme-toggle { font-size: 1rem; }
            .lang-opt, .lang-sep { font-size: 0.9rem; }
            main { padding: 1.5rem 1rem 3rem; }
            .films-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .modal-content { width: 95%; max-height: 85vh; border-radius: 24px; }
            .modal-title { font-size: 1.4rem; }
            .custom-controls { gap: 0.5rem; padding: 0.5rem; }
            .custom-controls button { font-size: 1rem; border-radius: 30px; }
            .overlay-inner { border-radius: 20px; }
            footer { border-radius: 12px 12px 0 0; padding: 2rem 1.5rem; }
        }
    </style>
</head>

    <script>
        // ==================== DONNÉES FILMS ====================
        const filmsData = [
            { id: 'f1', vimeoId: '1178257364', posterFile: 'FAIS.png', bannerFile: 'fais_passer.png', titleKey: 'f1' },
            { id: 'f2', vimeoId: '1180084260', posterFile: 'ALLEZ.png', bannerFile: 'allez_danse.png', titleKey: 'f2' },
            { id: 'f3', vimeoId: '1180087324', posterFile: 'BRULURES.png', bannerFile: 'brulures.png', titleKey: 'f3' },
            { id: 'f4', vimeoId: '1180089663', posterFile: 'CPE.png', bannerFile: 'cpe.png', titleKey: 'f4' },
            { id: 'f5', vimeoId: '1180151388', posterFile: 'EUPHORIC.png', bannerFile: null, titleKey: 'f5' },
            { id: 'f6', vimeoId: '1180151350', posterFile: 'WHISPER.png', bannerFile: null, titleKey: 'f6' }
        ];

        const detailedDescFR = {
            f1: `J’ai eu l’occasion de participer à un 48H Concours de Court Métrages organisé par l’association ¾ de Pouce du 20 au 22 Mars 2026. J’ai donc réalisé avec mon groupe d’amis ce court métrage sur le temps du week-end. Nous avions le thème imposé suivant : « l’effet papillon ». Je me suis occupé du scénario avec Lucas Suard, filmé quelques plans dont ceux dans le hangar et monté entièrement le projet sur Adobe Premiere Pro. Merci encore au Losange Noir de nous avoir prêté le matériel sans lequel ce projet n’aurait pas pu avoir lieu et à ¾ de Pouce pour cette expérience mémorable.`,
            f2: `Dans le cadre de l’option CAV de mon lycée, j’ai participé au Festival des Jeunes Étoiles 2 Valenciennes le 3 avril 2025. Nous avions alors eu la chance de travailler avec Julie Gourdain qui nous a guidés dans ce projet. J’ai donc beaucoup participé à l’écriture du film en m’inspirant fortement de la vie de mon meilleur ami qui a alors incarné son propre rôle. C’était un projet qui m’a pris beaucoup à cœur et dans lequel je me suis beaucoup impliqué. J’ai donc réalisé mais également monté ce court métrage avec Adobe Premiere Pro. Nous avons eu l’honneur d’être primés en recevant l’étoile de bronze du jury professionnel lors de la projection de notre film au Cinéma Pathé à Valenciennes.`,
            f3: `Avec l’option CAV de mon lycée, nous avons la chance cette année de participer à nouveau au Festival des Jeunes Étoiles 2 Valenciennes. Nous présenterons alors ce projet que nous avons réalisé dans le cadre d’un « projet couleur » où nous avions pour contrainte de passer de la couleur au noir et blanc. Sur ce projet j’ai notamment écrit, monté et joué.`,
            f4: `Faisant partie du dispositif pHARe de mon lycée, nous avions pour projet avec les autres ambassadeurs de réaliser un court métrage pour dénoncer la surcharge de travail des CPE et l’incapacité de gérer des problèmes encore trop présents de nos jours. Dans ce projet, je me suis chargé d’écrire le script, les personnages et de mettre en scène. Mais j’ai également filmé et monté intégralement le projet.`,
            f5: `Avec l’option CAV de mon lycée, dans le cadre de la réalisation d’un « projet flashback », nous avons réalisé un Western humoristique pendant notre année de seconde. Le film a été tourné avec le matériel du lycée et monté sur Adobe After Effects et Premiere Pro.`,
            f6: `Dans le cadre de la réalisation d’un projet « Whip Pan » avec l’option CAV de mon lycée, nous avons rendu compte de ce court métrage d’horreur réalisé avec le matériel du lycée. J’ai alors joué et monté le film avec Shotcut, le logiciel de montage du lycée.`
        };

        const detailedDescEN = {
            f1: `I had the opportunity to participate in a 48H Short Film Competition organized by the association ¾ de Pouce from March 20 to 22, 2026. I made this short film with my group of friends over the weekend. The imposed theme was "the butterfly effect". I co-wrote the script with Lucas Suard, filmed some shots including those in the hangar, and fully edited the project on Adobe Premiere Pro. Thanks to Losange Noir for lending us the equipment and to ¾ de Pouce for this memorable experience.`,
            f2: `As part of my high school's CAV option, I participated in the Festival des Jeunes Étoiles 2 Valenciennes on April 3, 2025. We had the chance to work with Julie Gourdain who guided us. I was heavily involved in writing the film, drawing inspiration from my best friend's life, who played his own role. I directed and edited this short film with Adobe Premiere Pro. We were honored to receive the Bronze Star from the professional jury at the screening of our film at Pathé Cinema in Valenciennes.`,
            f3: `With my high school's CAV option, we are lucky to participate again this year in the Festival des Jeunes Étoiles 2 Valenciennes. We will present this project made as part of a "color project" where we had to transition from color to black and white. On this project I wrote, edited and acted.`,
            f4: `As part of the pHARe program in my high school, we ambassadors worked on a short film to denounce the workload of CPEs and their inability to handle still-present issues. I wrote the script, developed the characters, directed, filmed, and fully edited the project.`,
            f5: `With my high school's CAV option, as part of a "flashback project", we made a humorous Western during our sophomore year. The film was shot with school equipment and edited on Adobe After Effects and Premiere Pro.`,
            f6: `As part of a "Whip Pan" project with my high school's CAV option, we produced this horror short film using school equipment. I acted and edited the film with Shotcut, the school's editing software.`
        };

        const T = {
            fr: {
                themeDay: 'Mode nuit', themeNight: 'Mode jour',
                navHome: 'Accueil', navProjects: 'Projets', navAbout: 'À propos',
                sectionTitle: 'Courts Métrages',
                f1: { title: 'Fais Passer', meta: '2026 · Court métrage · 3 min 19', role: 'Co-écriture, réalisation, image, montage', desc: 'Trois potes s\'ennuient, une claque derrière la nuque, et soudain… ils mettent le mafieux dans la partie.', tags: ['3/4 de Pouce', '48H Film Festival'], detailed: detailedDescFR.f1 },
                f2: { title: 'Allez Danse !', meta: '2025 · Court métrage · 9 min 58', role: 'Écriture, réalisation, montage, image', desc: 'Un ado a du mal à s\'affirmer dans sa passion qu\'est la danse, mais un jour, un défi entre amis va le pousser à s\'affirmer et à prendre confiance…', tags: ['Drame'], detailed: detailedDescFR.f2 },
                f3: { title: 'Brûlures', meta: '2026 · Court métrage · 8 min', role: 'Écriture, réalisation, montage, image', desc: 'Elle avait enfin tourné la page… du moins, c\'est ce qu\'elle croyait.', tags: ['Drame'], detailed: detailedDescFR.f3 },
                f4: { title: 'CPE', meta: '2026 · Court métrage · 12 min', role: 'Écriture, réalisation, montage, image', desc: 'Dans les couloirs du lycée, certains coups blessent… d\'autres silences détruisent.', tags: ['Drame', 'pHARe'], detailed: detailedDescFR.f4 },
                f5: { title: 'The Euphoric Man', meta: '2026 · Court métrage · à venir', role: 'Écriture, jeu, mise en scène, montage', desc: 'Ils étaient prêts à tirer… jusqu\'à ce que leur passé les rattrape.', tags: ['Western', 'Comédie'], detailed: detailedDescFR.f5 },
                f6: { title: 'Whisper', meta: '2026 · Court métrage · à venir', role: 'Écriture, montage, jeu, mise en scène', desc: 'Une cave. Deux amis. Et quelque chose qui n\'aurait jamais dû être dérangé.', tags: ['Horreur'], detailed: detailedDescFR.f6 }
            },
            en: {
                themeDay: 'Dark mode', themeNight: 'Light mode',
                navHome: 'Home', navProjects: 'Projects', navAbout: 'About',
                sectionTitle: 'Short Films',
                f1: { title: 'Fais Passer', meta: '2026 · Short film · 3 min 19', role: 'Co-writing, direction, cinematography, editing', desc: 'Three friends are killing time, a quick slap to the back of the neck and suddenly… a mobster\'s part of the game.', tags: ['3/4 de Pouce', '48H Film Festival'], detailed: detailedDescEN.f1 },
                f2: { title: 'Allez Danse !', meta: '2025 · Short film · 9 min 58', role: 'Writing, direction, editing, cinematography', desc: 'A teenager struggles to believe in himself in his passion for dance, but one day, a challenge among friends will push him to assert himself and gain confidence…', tags: ['Drama'], detailed: detailedDescEN.f2 },
                f3: { title: 'Brûlures', meta: '2026 · Short film · 8 min', role: 'Writing, direction, editing, cinematography', desc: 'She had finally turned the page… or so she believed.', tags: ['Drama'], detailed: detailedDescEN.f3 },
                f4: { title: 'CPE', meta: '2026 · Short film · 12 min', role: 'Writing, direction, editing, cinematography', desc: 'In the school hallways, some blows hurt… but other silences destroy.', tags: ['Drama', 'pHARe'], detailed: detailedDescEN.f4 },
                f5: { title: 'The Euphoric Man', meta: '2026 · Short film · coming soon', role: 'Writing, acting, directing, editing', desc: 'They were ready to shoot… until their past caught up with them.', tags: ['Western', 'Comedy'], detailed: detailedDescEN.f5 },
                f6: { title: 'Whisper', meta: '2026 · Short film · coming soon', role: 'Writing, editing, acting, directing', desc: 'A basement. Two friends. And something that should never have been disturbed.', tags: ['Horror'], detailed: detailedDescEN.f6 }
            }
        };

        let currentLang = 'fr';
        let currentPlayer = null;
        let progressInterval = null;

        const header = document.getElementById('mainHeader');
        const mainBody = document.getElementById('mainBody');
        const themeToggle = document.getElementById('themeToggle');
        const toggleImage = document.getElementById('toggleImage');
        const favicon = document.querySelector('link[rel="icon"]');
        const filmsGrid = document.getElementById('filmsGrid');
        const modal = document.getElementById('filmModal');
        const modalContent = document.getElementById('modalContent');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const overlay = document.getElementById('videoOverlay');
        const playerContainer = document.getElementById('vimeoPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFilled = document.getElementById('progressFilled');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoClickOverlay = document.getElementById('videoClickOverlay');

        function renderGrid() {
            const t = T[currentLang];
            filmsGrid.innerHTML = '';
            filmsData.forEach(film => {
                const filmText = t[film.titleKey];
                const posterPath = `./doc/affiches/${film.posterFile}`;
                const card = document.createElement('div');
                card.className = 'film-poster-card';
                const img = document.createElement('img');
                img.className = 'poster-img';
                img.src = posterPath;
                img.alt = filmText.title;
                img.loading = 'lazy';
                img.onerror = function() {
                    this.style.display = 'none';
                    const fallback = document.createElement('div');
                    fallback.style.cssText = 'display:flex; align-items:center; justify-content:center; background:#3a3a3a; aspect-ratio:2/3; color:white; font-size:0.8rem; text-align:center; padding:1rem; border-radius:20px;';
                    fallback.textContent = filmText.title;
                    this.parentNode.insertBefore(fallback, this.nextSibling);
                };
                const titleDiv = document.createElement('div');
                titleDiv.className = 'film-title-card';
                titleDiv.textContent = filmText.title;
                card.appendChild(img);
                card.appendChild(titleDiv);
                card.addEventListener('click', () => openFilmDetails(film.id));
                filmsGrid.appendChild(card);
            });
            document.getElementById('film-counter').textContent = String(filmsData.length).padStart(2, '0');
        }

        function openFilmDetails(filmId) {
            const film = filmsData.find(f => f.id === filmId);
            if (!film) return;
            const t = T[currentLang];
            const filmText = t[film.titleKey];
            const posterPath = `./doc/affiches/${film.posterFile}`;
            const bannerPath = film.bannerFile ? `./doc/banieres/${film.bannerFile}` : null;
            const tagsHtml = filmText.tags.map(tag => {
                if (tag === 'pHARe') return `<span class="modal-tag"><a href="https://www.education.gouv.fr/non-au-harcelement/phare-un-dispositif-de-lutte-contre-le-harcelement-l-ecole-323435" target="_blank" style="color:inherit; text-decoration:none;">pHARe</a></span>`;
                return `<span class="modal-tag">${tag}</span>`;
            }).join('');
            
            let visualHtml = '';
            if (bannerPath) {
                visualHtml = `<img class="modal-banner" src="${bannerPath}" alt="bannière" onerror="this.style.display='none'">`;
            } else {
                visualHtml = `<img class="modal-poster" src="${posterPath}" alt="${filmText.title}" onerror="this.style.display='none'">`;
            }
            
            modalContent.innerHTML = `
                ${visualHtml}
                <div class="modal-info">
                    <div class="modal-title">${filmText.title}</div>
                    <div class="modal-meta">${filmText.meta}</div>
                    <div class="modal-role">${filmText.role}</div>
                    <div class="modal-desc">${filmText.desc}</div>
                    <div class="modal-tags">${tagsHtml}</div>
                    <button class="watch-btn" id="modalWatchBtn">▶ Lire le film</button>
                    <div class="detailed-desc">${filmText.detailed.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            modal.classList.add('active');
            const watchBtn = document.getElementById('modalWatchBtn');
            if (watchBtn) {
                watchBtn.onclick = () => {
                    modal.classList.remove('active');
                    openVideoPlayer(film.vimeoId);
                };
            }
        }

        function closeModal() { modal.classList.remove('active'); }

        // ==================== LECTEUR VIDÉO ====================
        function togglePlayPause() {
            if (currentPlayer) {
                currentPlayer.getPaused().then(paused => {
                    if (paused) currentPlayer.play();
                    else currentPlayer.pause();
                });
            }
        }
        if (videoClickOverlay) videoClickOverlay.onclick = togglePlayPause;

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function updateProgress() {
            if (currentPlayer) {
                currentPlayer.getCurrentTime().then(seconds => {
                    currentPlayer.getDuration().then(duration => {
                        const percent = (seconds / duration) * 100;
                        progressFilled.style.width = `${percent}%`;
                        timeDisplay.textContent = `${formatTime(seconds)} / ${formatTime(duration)}`;
                    });
                }).catch(e => console.log("Erreur temps", e));
            }
        }

        function stopProgressInterval() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        function startProgressUpdates() {
            stopProgressInterval();
            progressInterval = setInterval(updateProgress, 500);
        }

        function initPlayer(videoId) {
            if (currentPlayer) {
                stopProgressInterval();
                currentPlayer.destroy().catch(e => console.log("Destroy error", e));
                currentPlayer = null;
            }
            playerContainer.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.setAttribute('src', `https://player.vimeo.com/video/${videoId}?badge=0&autopause=0&player_id=0&app_id=58479&loop=0&autoplay=0&muted=0&controls=0&portrait=0&byline=0&title=0`);
            iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
            iframe.setAttribute('allowfullscreen', '');
            iframe.classList.add('vimeo-player');
            playerContainer.appendChild(iframe);
            const container = document.querySelector('.video-container');
            let clickOverlay = document.getElementById('videoClickOverlay');
            if (!clickOverlay) {
                clickOverlay = document.createElement('div');
                clickOverlay.id = 'videoClickOverlay';
                clickOverlay.className = 'video-click-overlay';
                container.appendChild(clickOverlay);
            }
            document.getElementById('videoClickOverlay').onclick = togglePlayPause;

            currentPlayer = new Vimeo.Player(iframe);
            currentPlayer.ready().then(() => {
                currentPlayer.getPaused().then(paused => {
                    const isPlaying = !paused;
                    playPauseBtn.textContent = isPlaying ? '❚❚' : '►';
                });
                currentPlayer.on('play', () => {
                    playPauseBtn.textContent = '❚❚';
                    startProgressUpdates();
                });
                currentPlayer.on('pause', () => {
                    playPauseBtn.textContent = '►';
                    stopProgressInterval();
                });
                currentPlayer.on('ended', () => {
                    playPauseBtn.textContent = '►';
                    stopProgressInterval();
                    progressFilled.style.width = '0%';
                    timeDisplay.textContent = '0:00 / 0:00';
                });
                currentPlayer.on('timeupdate', updateProgress);
                updateProgress();
                startProgressUpdates();
            }).catch(err => console.log("Erreur init Vimeo", err));
        }

        function openVideoPlayer(videoId) {
            initPlayer(videoId);
            overlay.classList.add('active');
        }

        function closeVideoOverlay(e) {
            if (e) e.preventDefault();
            stopProgressInterval();
            if (currentPlayer) {
                currentPlayer.destroy().catch(()=>{});
                currentPlayer = null;
            }
            playerContainer.innerHTML = '';
            overlay.classList.remove('active');
        }

        playPauseBtn.onclick = togglePlayPause;
        progressBar.onclick = (e) => {
            if (currentPlayer) {
                const rect = progressBar.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const percent = clickX / width;
                currentPlayer.getDuration().then(duration => {
                    currentPlayer.setCurrentTime(duration * percent);
                });
            }
        };
        fullscreenBtn.onclick = () => {
            const container = document.querySelector('.overlay-inner');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                else if (container.msRequestFullscreen) container.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }
        };
        function updateFullscreenIcon() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                fullscreenBtn.textContent = '⤬';
            } else {
                fullscreenBtn.textContent = '⤢';
            }
        }
        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
        overlay.onclick = (e) => { if (e.target === overlay) closeVideoOverlay(); };
        window.addEventListener('keydown', function(e) {
            if (!overlay.classList.contains('active')) return;
            if (!currentPlayer) return;
            if (e.code === 'Space') { e.preventDefault(); togglePlayPause(); return; }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
            if (e.key === 'ArrowLeft') {
                currentPlayer.getCurrentTime().then(current => {
                    currentPlayer.setCurrentTime(Math.max(0, current - 5));
                }).catch(err => console.log(err));
            } else if (e.key === 'ArrowRight') {
                currentPlayer.getDuration().then(duration => {
                    currentPlayer.getCurrentTime().then(current => {
                        currentPlayer.setCurrentTime(Math.min(duration, current + 5));
                    });
                }).catch(err => console.log(err));
            } else if (e.key === 'Escape') { e.preventDefault(); closeVideoOverlay(); }
        });

        // ==================== THÈME & LANGUE ====================
        function saveDarkMode(isDark) { localStorage.setItem('darkMode', isDark ? 'true' : 'false'); }
        function saveLang(lang) { localStorage.setItem('lang', lang); }
        function setLang(lang) {
            currentLang = lang;
            const t = T[lang];
            document.getElementById('nav-home').textContent = t.navHome;
            document.getElementById('nav-projects').textContent = t.navProjects;
            document.getElementById('nav-about').textContent = t.navAbout;
            document.getElementById('section-title').textContent = t.sectionTitle;
            themeToggle.textContent = mainBody.classList.contains('dark-mode') ? t.themeNight : t.themeDay;
            document.getElementById('lang-fr').classList.toggle('active-lang', lang === 'fr');
            document.getElementById('lang-en').classList.toggle('active-lang', lang === 'en');
            renderGrid();
            saveLang(lang);
        }
        function loadPreferences() {
            const savedLang = localStorage.getItem('lang');
            setLang(savedLang === 'fr' || savedLang === 'en' ? savedLang : 'fr');
            const savedDark = localStorage.getItem('darkMode');
            if (savedDark === 'true') {
                mainBody.classList.add('dark-mode');
                themeToggle.textContent = T[currentLang].themeNight;
                toggleImage.src = './doc/logo_nuit.png';
                favicon.href = './doc/logo_nuit.png';
            } else {
                mainBody.classList.remove('dark-mode');
                themeToggle.textContent = T[currentLang].themeDay;
                toggleImage.src = './doc/logo.png';
                favicon.href = './doc/logo.png';
            }
            const savedHeader = localStorage.getItem('headerExpanded');
            if (savedHeader === 'true') header.classList.add('expanded');
            else header.classList.remove('expanded');
        }
        function toggleHeader() {
            header.classList.toggle('expanded');
            localStorage.setItem('headerExpanded', header.classList.contains('expanded'));
        }
        themeToggle.onclick = () => {
            const isDark = mainBody.classList.toggle('dark-mode');
            saveDarkMode(isDark);
            themeToggle.textContent = isDark ? T[currentLang].themeNight : T[currentLang].themeDay;
            const src = isDark ? './doc/logo_nuit.png' : './doc/logo.png';
            toggleImage.src = src;
            favicon.href = src;
        };
        document.getElementById('lang-fr').onclick = (e) => { e.preventDefault(); setLang('fr'); };
        document.getElementById('lang-en').onclick = (e) => { e.preventDefault(); setLang('en'); };
        closeModalBtn.onclick = closeModal;
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        loadPreferences();
    </script>
</body>
</html>
