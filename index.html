<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Louis — Hello, moi c'est Louis !</title>
    <link rel="icon" href="./doc/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Radley:ital@0;1&display=swap" rel="stylesheet">
    <style>
        /* ===== VARIABLES & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            --bg-color: #f4f1e8;
            --text-color: #191919;
            --border-color: #191919;
            --card-bg: rgba(25, 25, 25, 0.04);
            --modal-bg: #ffffff;
            --modal-text: #191919;
            --modal-border: rgba(25, 25, 25, 0.2);
            --btn-bg: #9c481a;
            --btn-text: #f4f1e8;
            --bubble-bg: var(--card-bg);
            --bubble-hover-bg: #191919;
            --bubble-hover-text: #f4f1e8;
            --line-color: rgba(25, 25, 25, 0.18);
            font-family: 'Radley', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --border-color: #f0f0f0;
            --card-bg: rgba(240, 240, 240, 0.05);
            --modal-bg: #2a2a2a;
            --modal-text: #f0f0f0;
            --modal-border: rgba(240, 240, 240, 0.2);
            --btn-bg: #f0f0f0;
            --btn-text: #1a1a1a;
            --bubble-bg: #1a1a1a;
            --bubble-hover-bg: #f0f0f0;
            --bubble-hover-text: #1a1a1a;
            --line-color: rgba(240, 240, 240, 0.15);
        }

        /* ===== HEADER (logo centré, animation fluide) ===== */
        header {
            position: relative;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background-color: transparent;
            z-index: 10;
            transition: background-color 0.3s ease, backdrop-filter 0.3s ease;
            flex-shrink: 0;
            border-radius: 0 !important;
        }
        header.expanded {
            background-color: color-mix(in srgb, var(--bg-color) 92%, transparent);
            backdrop-filter: blur(12px);
            border-radius: 0 !important;
        }
        header.expanded::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 1px;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--border-color) 25%, transparent), transparent);
            opacity: 0.7;
            pointer-events: none;
        }

        .logo-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: left 0.5s cubic-bezier(0.4, 1.2, 0.6, 1), transform 0.5s cubic-bezier(0.4, 1.2, 0.6, 1);
            z-index: 20;
            line-height: 0;
        }
        header.expanded .logo-container {
            left: 2rem;
            transform: translate(0, -50%);
        }
        #toggleImage {
            width: 65px;
            height: 65px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s ease;
            border-radius: 12px;
            display: block;
        }
        #toggleImage:hover { transform: scale(1.05) rotate(3deg); }

        .options {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0s 0.3s;
            margin-left: auto;
        }
        header.expanded .options {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.25s ease 0.05s, visibility 0s 0s;
        }
        .options ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            align-items: center;
            margin: 0;
            padding: 0;
        }
        .options li {
            display: inline-block;
            line-height: 1;
        }
        .options a, .theme-toggle {
            color: var(--text-color);
            text-decoration: none;
            font-family: 'Radley', serif;
            font-size: 1.1rem;
            padding: 0.5rem 0;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.2s, opacity 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            display: inline-block;
            line-height: 1.2;
        }
        .options a:hover, .theme-toggle:hover {
            border-bottom-color: var(--border-color);
        }

        .lang-switcher {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
        }
        .lang-opt {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            padding: 0.2rem 0;
            border-bottom: 1.5px solid transparent;
            opacity: 0.5;
            transition: opacity 0.2s, border-color 0.2s;
        }
        .lang-opt.active-lang {
            border-bottom-color: var(--border-color);
            opacity: 1;
        }
        .lang-opt:hover {
            opacity: 1;
        }
        .lang-sep {
            opacity: 0.4;
            font-size: 1rem;
            user-select: none;
        }

        /* ===== VIDÉO DE FOND (conteneur et iframe) ===== */
        .bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-video-iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Les dimensions initiales seront écrasées par le script */
            width: auto;
            height: auto;
            min-width: 100%;
            min-height: 100%;
            border: 0;
        }

        #bg-veil {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            opacity: 0.82;
            z-index: 1;
            pointer-events: none;
            transition: background-color 0.3s;
        }

        /* ===== MAIN ===== */
        main {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #mindmap-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .hero {
            text-align: center;
            position: relative;
            z-index: 3;
        }
        .hero h1 {
            font-size: clamp(2rem, 7vw, 5rem);
            font-weight: 400;
            line-height: 1.2;
            cursor: default;
            user-select: none;
            opacity: 0;
            animation: titleAppear 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            animation-delay: 0.2s;
        }
        .hero .hello { font-style: italic; }
        .hero .rest { font-style: normal; }

        /* ===== BULLES ===== */
        .bubble {
            position: absolute;
            z-index: 2;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }
        .bubble.visible {
            opacity: 1;
            transform: scale(1) translate(0, 0);
        }
        .bubble-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid color-mix(in srgb, var(--border-color) 20%, transparent);
            background: var(--bubble-bg);
            color: var(--text-color);
            font-family: 'Radley', serif;
            font-size: 0.9rem;
            text-align: center;
            padding: 0.5rem;
            line-height: 1.3;
            backdrop-filter: blur(2px);
            transition: background-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }
        .bubble:hover .bubble-inner {
            background-color: var(--bubble-hover-bg);
            color: var(--bubble-hover-text);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-color: var(--border-color);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-7px); }
            100% { transform: translateY(0px); }
        }
        .bubble.visible {
            animation: float var(--float-duration, 4s) ease-in-out infinite;
            animation-delay: var(--float-delay, 0s);
        }
        .bubble.visible:hover {
            animation-play-state: paused;
        }

        /* ===== KEYFRAMES ===== */
        @keyframes titleAppear {
            0% { opacity: 0; transform: translateY(12px) scale(0.98); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            header { height: 80px; padding: 0 1rem; }
            .logo-container { top: 50%; }
            #toggleImage { width: 55px; height: 55px; }
            header.expanded .logo-container { left: 1rem; }
            .options ul { gap: 1.2rem; }
            .options a, .theme-toggle { font-size: 1rem; }
            .lang-opt, .lang-sep { font-size: 0.9rem; }
            .bubble-inner { font-size: 0.75rem; }
        }
    </style>
</head>
<body id="mainBody">

    <header id="mainHeader" class="expanded">
        <div class="logo-container">
            <img src="./doc/logo.png" alt="Menu" id="toggleImage">
        </div>
        <nav class="options">
            <ul>
                <li><a href="#" id="nav-home">Accueil</a></li>
                <li><a href="projets.html" id="nav-projects">Projets</a></li>
                <li>
                    <div class="lang-switcher">
                        <a href="#" id="lang-fr" class="lang-opt active-lang">FR</a>
                        <span class="lang-sep">/</span>
                        <a href="#" id="lang-en" class="lang-opt">EN</a>
                    </div>
                </li>
                <li><button class="theme-toggle" id="themeToggle">Mode nuit</button></li>
                <li><a href="#" id="nav-contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="mainArea">
        <div class="bg-video-container">
            <iframe class="bg-video-iframe" src="https://player.vimeo.com/video/1178256742?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479&amp;loop=1&amp;autoplay=1&amp;muted=1&amp;controls=0" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="showreel"></iframe>
        </div>
        <script src="https://player.vimeo.com/api/player.js"></script>
        <div id="bg-veil"></div>
        <svg id="mindmap-canvas" aria-hidden="true"></svg>
        <div class="hero" id="heroText">
            <h1 id="mainTitle">
                <span class="hello" id="title-hello">Hello,</span>
                <span class="rest" id="title-rest"> moi c'est Louis!</span>
            </h1>
        </div>
    </main>

    <script>
        // ==================== REDIMENSIONNEMENT DYNAMIQUE DE LA VIDÉO POUR COUVRIR L'ÉCRAN ====================
        const bgVideoIframe = document.querySelector('.bg-video-iframe');
        const bgVideoContainer = document.querySelector('.bg-video-container');

        function resizeVimeoToCover() {
            if (!bgVideoIframe || !bgVideoContainer) return;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const windowRatio = windowWidth / windowHeight;
            const videoRatio = 16 / 9; // Ta vidéo est en 1920x1080 (16:9)

            let scale;
            if (windowRatio > videoRatio) {
                // La fenêtre est plus large que la vidéo → on scale sur la hauteur
                scale = windowHeight / (windowWidth / videoRatio);
            } else {
                // La fenêtre est plus haute → on scale sur la largeur
                scale = windowWidth / (windowHeight * videoRatio);
            }

            // Applique le scale (l'iframe est déjà centrée avec translate(-50%, -50%))
            bgVideoIframe.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        // Exécute au chargement et au redimensionnement
        window.addEventListener('load', resizeVimeoToCover);
        window.addEventListener('resize', resizeVimeoToCover);
        resizeVimeoToCover(); // appel immédiat au cas où

        // ==================== DONNÉES DES PAGES ====================
        const PAGES = [
            { id: 'musique',   labels: { fr: 'Musique',           en: 'Music'        }, size: 100, href: 'musique.html'   },
            { id: 'theatre',   labels: { fr: 'Théâtre',           en: 'Theatre'      }, size: 95,  href: 'theatre.html'   },
            { id: 'montages',  labels: { fr: 'Montages\nVidéo',   en: 'Video\nEditing'}, size: 105, href: 'montages.html'  },
            { id: 'films',     labels: { fr: 'Court Métrages',    en: 'Short Films' }, size: 120, href: 'films.html' },
            { id: 'blog',      labels: { fr: 'Blog',              en: 'Blog'         }, size: 88,  href: 'blog.html'      },
            { id: 'about',     labels: { fr: 'À propos',          en: 'About Me'     }, size: 98,  href: 'about.html'     },
        ];

        let currentLang = 'fr';
        let bubblesReady = false;
        let buildTimeout = null;
        let isFirstLoadComplete = false;

        const translations = {
            fr: { navHome: 'Accueil', navProjects: 'Projets', navContact: 'Contact', themeDay: 'Mode nuit', themeNight: 'Mode jour', titleHello: 'Hello,', titleRest: ' moi c\'est Louis!' },
            en: { navHome: 'Home',    navProjects: 'Projects', navContact: 'Contact', themeDay: 'Dark mode',  themeNight: 'Light mode', titleHello: 'Hello,', titleRest: ' I\'m Louis!' }
        };

        // Éléments DOM
        const toggleImage = document.getElementById('toggleImage');
        const header      = document.getElementById('mainHeader');
        const themeToggle = document.getElementById('themeToggle');
        const body        = document.getElementById('mainBody');
        const favicon     = document.querySelector('link[rel="icon"]');
        const navHome     = document.getElementById('nav-home');
        const navProjects = document.getElementById('nav-projects');
        const navContact  = document.getElementById('nav-contact');
        const titleHello  = document.getElementById('title-hello');
        const titleRest   = document.getElementById('title-rest');
        const langFr      = document.getElementById('lang-fr');
        const langEn      = document.getElementById('lang-en');
        const mainArea    = document.getElementById('mainArea');
        const svgCanvas   = document.getElementById('mindmap-canvas');
        const heroText    = document.getElementById('heroText');
        const mainTitleH1 = document.getElementById('mainTitle');

        // ==================== FONCTIONS ====================
        function saveDarkMode(isDark) { localStorage.setItem('darkMode', isDark ? 'true' : 'false'); }
        function saveLang(lang) { localStorage.setItem('lang', lang); }

        function restartTitleAnimation() {
            if (!mainTitleH1) return;
            mainTitleH1.style.animation = 'none';
            void mainTitleH1.offsetHeight;
            mainTitleH1.style.animation = '';
        }

        function setLang(lang, skipTitleAnimation = false) {
            currentLang = lang;
            const t = translations[lang];
            navHome.textContent     = t.navHome;
            navProjects.textContent = t.navProjects;
            navContact.textContent  = t.navContact;
            titleHello.textContent  = t.titleHello;
            titleRest.textContent   = t.titleRest;
            langFr.classList.toggle('active-lang', lang === 'fr');
            langEn.classList.toggle('active-lang', lang === 'en');
            const isDark = body.classList.contains('dark-mode');
            themeToggle.textContent = isDark ? t.themeNight : t.themeDay;
            if (bubblesReady) updateBubbleLabels();
            scheduleBuildBubbles();
            if (!skipTitleAnimation && isFirstLoadComplete) restartTitleAnimation();
            saveLang(lang);
        }

        function scheduleBuildBubbles() {
            if (buildTimeout) clearTimeout(buildTimeout);
            buildTimeout = setTimeout(() => {
                buildBubbles();
                buildTimeout = null;
            }, 150);
        }

        function getBubblePositions(n, containerW, containerH) {
            const cx = containerW / 2, cy = containerH / 2;
            const heroRect = heroText.getBoundingClientRect();
            const heroW = heroRect.width, heroH = heroRect.height;
            const safeRx = Math.min(heroW / 2 + 120, containerW * 0.44);
            const safeRy = Math.min(heroH / 2 + 110, containerH * 0.42);
            const angles  = [-115, -55, 15, 80, 120, 175];
            const nudgeY  = [0, 0, 0, 0, 55, 0];
            return angles.slice(0, n).map((deg, i) => ({
                x: cx + safeRx * Math.cos(deg * Math.PI / 180) + (Math.random() - 0.5) * 28,
                y: cy + safeRy * Math.sin(deg * Math.PI / 180) + (Math.random() - 0.5) * 18 + (nudgeY[i] || 0),
            }));
        }

        let bubbleEls = [];

        function buildBubbles() {
            bubbleEls.forEach(el => el.remove());
            bubbleEls = [];
            while (svgCanvas.firstChild) svgCanvas.removeChild(svgCanvas.firstChild);

            const W = mainArea.offsetWidth, H = mainArea.offsetHeight;
            if (W === 0 || H === 0) return;
            const positions = getBubblePositions(PAGES.length, W, H);
            const cx = W / 2, cy = H / 2;

            PAGES.forEach((page, i) => {
                const pos = positions[i];
                const size = page.size;

                // Ligne
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', cx); line.setAttribute('y1', cy);
                line.setAttribute('x2', pos.x); line.setAttribute('y2', pos.y);
                line.setAttribute('stroke', 'var(--line-color)');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('stroke-dasharray', '4 5');
                svgCanvas.appendChild(line);

                // Bulle
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.dataset.pageId = page.id;
                bubble.style.cssText = `width:${size}px;height:${size}px;left:${pos.x - size/2}px;top:${pos.y - size/2}px;--float-duration:${3.5 + i * 0.4}s;--float-delay:${i * 0.22}s;`;
                const label = (page.labels[currentLang] || page.labels.fr).replace(/\n/g, '<br>');
                bubble.innerHTML = `<div class="bubble-inner">${label}</div>`;
                bubble.setAttribute('role', 'button');
                bubble.setAttribute('tabindex', '0');
                bubble.setAttribute('aria-label', page.labels[currentLang]);
                bubble.addEventListener('click', () => { window.location.href = page.href; });
                bubble.addEventListener('keydown', e => { if (e.key === 'Enter') bubble.click(); });
                mainArea.appendChild(bubble);
                bubbleEls.push(bubble);
                setTimeout(() => bubble.classList.add('visible'), 50 + i * 80);
            });
            bubblesReady = true;
        }

        function updateBubbleLabels() {
            bubbleEls.forEach((el, i) => {
                const page = PAGES[i];
                const label = (page.labels[currentLang] || page.labels.fr).replace(/\n/g, '<br>');
                el.querySelector('.bubble-inner').innerHTML = label;
                el.setAttribute('aria-label', page.labels[currentLang]);
            });
        }

        // ==================== CHARGEMENT DES PRÉFÉRENCES ====================
        function loadPreferences() {
            const savedLang = localStorage.getItem('lang');
            if (savedLang === 'fr' || savedLang === 'en') setLang(savedLang, true);
            else setLang('fr', true);
            const savedDark = localStorage.getItem('darkMode');
            if (savedDark === 'true') {
                body.classList.add('dark-mode');
                themeToggle.textContent = translations[currentLang].themeNight;
                toggleImage.src = './doc/logo_nuit.png';
                favicon.href = './doc/logo_nuit.png';
            } else {
                body.classList.remove('dark-mode');
                themeToggle.textContent = translations[currentLang].themeDay;
                toggleImage.src = './doc/logo.png';
                favicon.href = './doc/logo.png';
            }
            isFirstLoadComplete = true;
        }

        // ==================== ÉVÉNEMENTS ====================
        navHome.addEventListener('click', (e) => { e.preventDefault(); window.location.reload(); });
        navProjects.addEventListener('click', (e) => { e.preventDefault(); header.classList.remove('expanded'); window.location.href = 'projets.html'; });
        
        // Modification ici : le lien Contact ouvre un mailto et replie le menu
        navContact.addEventListener('click', (e) => {
            e.preventDefault();
            header.classList.remove('expanded');
            window.location.href = 'mailto:louisplanardpro@gmail.com';
        });

        themeToggle.addEventListener('click', () => {
            const isDark = body.classList.toggle('dark-mode');
            saveDarkMode(isDark);
            themeToggle.textContent = isDark ? translations[currentLang].themeNight : translations[currentLang].themeDay;
            const src = isDark ? './doc/logo_nuit.png' : './doc/logo.png';
            toggleImage.src = src;
            favicon.href = src;
        });

        langFr.addEventListener('click', e => { e.preventDefault(); if (currentLang !== 'fr') setLang('fr', false); });
        langEn.addEventListener('click', e => { e.preventDefault(); if (currentLang !== 'en') setLang('en', false); });
        toggleImage.addEventListener('click', () => header.classList.toggle('expanded'));

        let resizeTimer;
        window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(scheduleBuildBubbles, 200); });

        // Initialisation
        loadPreferences();
        setTimeout(() => { if (!bubblesReady) scheduleBuildBubbles(); }, 200);
    </script>
</body>
</html>
